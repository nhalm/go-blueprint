name: Template Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go module + build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-smoke-${{ hashFiles('examples/_smoke-fixtures/go.mod.tmpl', 'go.mod') }}
          restore-keys: |
            ${{ runner.os }}-smoke-

      - name: Run extractor unit tests
        run: go test ./scripts/extract-docs/...

      - name: Run smoke
        run: make smoke
