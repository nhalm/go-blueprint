version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - unused
    - misspell
    - gocritic
    - revive
    - gocyclo
    - ineffassign
    - unconvert
    - unparam
    - wastedassign
    - prealloc
    - forbidigo
  settings:
    forbidigo:
      analyze-types: true
      forbid:
        # LC-1: *pgxkit.DB has no Ping method; use HealthCheck or IsReady.
        # Scoped to pgxkit so Redis clients (which do expose Ping) aren't flagged.
        - pattern: '\.Ping$'
          pkg: '^github\.com/nhalm/pgxkit/v2$'
          msg: '*pgxkit.DB does not expose Ping; use HealthCheck or IsReady'
        # LC-2: canonlog.AddRequestFields does not exist.
        - pattern: 'canonlog\.AddRequestFields'
          msg: 'use canonlog.InfoAdd(ctx, key, value) or canonlog.InfoAddMany(ctx, fields)'
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
        - opinionated
      disabled-checks:
        - commentFormatting
        - unlambda
        - whyNoLint
        - unnamedResult
        # hugeParam fights ARCHITECTURE.md's "pass values across layer
        # boundaries, not pointers" rule — domain types like models.Product
        # and config.Config are intentionally passed by value.
        - hugeParam
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: use-any
        # unused-parameter is disabled — cobra RunE and chi handler signatures
        # commonly include params (cmd, args, w) that the body doesn't reference,
        # but renaming them to `_` loses the type-name documentation that helps
        # readers identify the function's role.
    gocyclo:
      min-complexity: 15
    unparam:
      check-exported: false
  exclusions:
    paths:
      - internal/repository/generated

formatters:
  enable:
    - gofmt
    - goimports
