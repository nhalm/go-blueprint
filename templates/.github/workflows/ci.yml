name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      # Single entry point: same lint Make target developers run locally,
      # so flags can't drift between CI and dev. `make lint` builds the
      # custom-gcl binary (golangci-lint + blueprint-vet plugin) on the
      # first run and reuses it after via the .custom-gcl.yml file dep.
      - name: Run make lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: myapp_test
          POSTGRES_USER: myapp
          POSTGRES_PASSWORD: myapp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@latest

      - name: Generate mocks
        run: go generate ./...

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://myapp:myapp_test@localhost:5432/myapp_test?sslmode=disable
        run: go run cmd/myapp/main.go migrate up

      # Flags match the `make test-integration` target so local and CI runs
      # exercise the same code paths.
      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://myapp:myapp_test@localhost:5432/myapp_test?sslmode=disable
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        run: make build
